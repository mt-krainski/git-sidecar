# Example docker-compose configuration for git-sidecar.
# This file is intended to be modified per user to adapt to their use case.
# Adjust volume mounts, environment variables, and network settings as needed.

services:
  git-sidecar:
    build: .
    volumes:
      # Mount your projects directory
      - ~/Projects:/projects
      # Mount git config (read-only)
      - ~/.gitconfig:/home/sidecar/.gitconfig:ro
      # Mount only specific SSH keys (read-only)
      - ~/.ssh/id_ed25519:/home/sidecar/.ssh/id_ed25519:ro
      - ~/.ssh/id_ed25519.pub:/home/sidecar/.ssh/id_ed25519.pub:ro
      - ~/.ssh/known_hosts:/home/sidecar/.ssh/known_hosts:ro
      # Persist GitHub CLI credentials across rebuilds
      - gh-config:/home/sidecar/.config/gh
    environment:
      - PROJECTS_DIR=/projects
      - SIDECAR_HOST=0.0.0.0
      - SIDECAR_PORT=8900
      - ALLOWED_BRANCH_PREFIXES=task/,dependabot/
      - SIDECAR_TOKEN_FILENAME=.git-sidecar-token
    networks:
      - git-sidecar-net
    restart: unless-stopped

volumes:
  gh-config:

networks:
  git-sidecar-net:
    # External network — create once, both sidecar and dev containers join it
    # Create with: docker network create git-sidecar-net
    external: true
